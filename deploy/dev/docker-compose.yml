# Dev compose for dreamreader-sync.
#
# Self-contained build (context = repo root). Point DREAMSYNC_IAM_ISSUER at your
# running hertz-iam. By default the service reaches the host's IAM via
# host.docker.internal; to instead join the IAM dev network and reach it by
# service name, uncomment the networks block.
#
#   cd dreamreader-sync/deploy/dev
#   docker compose up --build
services:
  dreamreader-sync:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: dreamreader-sync:dev
    environment:
      DREAMSYNC_HTTP_ADDR: ":8090"
      DREAMSYNC_DB_PATH: "/data/dreamsync.db"
      DREAMSYNC_IAM_ISSUER: "${DREAMSYNC_IAM_ISSUER:-http://host.docker.internal:8080}"
      DREAMSYNC_JWKS_URI: "${DREAMSYNC_JWKS_URI:-}"
      DREAMSYNC_CLIENT_ID: "${DREAMSYNC_CLIENT_ID:-dreamreader}"
    ports:
      - "8090:8090"
    volumes:
      - dreamsync_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  dreamsync_data:

# Reach IAM by service name instead of host.docker.internal:
# networks:
#   default:
#     external: true
#     name: hertz-iam_default
